<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リラクゼーション千楽 | 千歳船橋駅 徒歩1分</title>

  <!-- 柔らかい丸フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ------------------------------
   ベースデザイン（高級ブラウン）
------------------------------*/
body {
  margin: 0;
  font-family: "Zen Maru Gothic", "Noto Sans JP", sans-serif;
  background: #f5eee7;
  color: #4a3b2a;
}

/* ------------------------------
   スライダー
------------------------------*/
.slider {
  position: relative;
  width: 100%;
  height: 60vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}

.slide.active {
  opacity: 1;
}

/* キャッチコピー */
.catchcopy {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.45);
  color: #fff;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 1.4rem;
  letter-spacing: 0.05em;
}

/* ------------------------------
   セクション
------------------------------*/
section {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 30px;
  color: #4a3b2a;
}

/* ------------------------------
   メニューカード
------------------------------*/
.menu-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.menu-item {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: transform 0.2s ease;
}

.menu-item:hover {
  transform: translateY(-4px);
}

.menu-item h3 {
  margin-top: 0;
  color: #4a3b2a;
}

/* ------------------------------
   アクセス
------------------------------*/
.map {
  width: 100%;
  height: 350px;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

/* ------------------------------
   フッター
------------------------------*/
footer {
  text-align: center;
  padding: 20px;
  background: #4a3b2a;
  color: #fff;
  margin-top: 40px;
}
</style>
</head>

<body>

<!-- ==============================
     スライダー
============================== -->
<div class="slider">
  <img src="room.jpg" class="slide active">
  <img src="foot.jpg" class="slide">

  <div class="catchcopy">心と体を癒す、至福のひととき</div>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 4000);
</script>

<!-- ==============================
     メニュー
============================== -->
<section>
  <h2>メニュー</h2>

  <div class="menu-list">
    <div class="menu-item">
      <h3>アロマリンパ</h3>
      <p>60分 6,000円 / 90分 8,500円</p>
    </div>

    <div class="menu-item">
      <h3>もみほぐし</h3>
      <p>60分 4,500円 / 90分 6,500円</p>
    </div>

    <div class="menu-item">
      <h3>足つぼ</h3>
      <p>40分 3,500円 / 60分 5,000円</p>
    </div>

    <div class="menu-item">
      <h3>ヘッドスパ</h3>
      <p>30分 2,500円</p>
    </div>
  </div>
</section>

<!-- ==============================
     アクセス
============================== -->
<section>
  <h2>アクセス</h2>

  <div class="map">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3242.2364782831387!2d139.61963857569867!3d35.64654493187886!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6018f36587b13fdb%3A0xe56f753febae0d73!2z44Oq44Op44Kv44K844O844K344On44OzIOWNg-alvQ!5e0!3m2!1sja!2sjp!4v1772993805778!5m2!1sja!2sjp" 
      width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy">
    </iframe>
  </div>
</section>

<footer>
  © リラクゼーション千楽
</footer>

</body>
</html>
